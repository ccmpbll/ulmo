<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}ulmo{% endblock %}</title>
  <link rel="icon" href="/static/logo.png?v={{ STATIC_VERSION }}" />
  <script src="https://unpkg.com/htmx.org@2.0.3"></script>
  <link rel="stylesheet" href="/static/style.css?v={{ STATIC_VERSION }}" />
</head>
<body>
  {% set user = current_user(request) %}
  {% if user %}
  <header class="topbar">
    <a class="brand" href="/">ulmo</a><span class="version">{{ APP_VERSION }}</span>
    <nav>
      <a href="/">Playbooks</a>
      <a href="/inventory">Inventory</a>
      <a href="/runs">Run History</a>
      <a href="/logs">Sync Logs</a>
      <a href="/settings">Settings</a>
    </nav>
    {% if AUTH_DISABLED %}
    <span class="who muted">auth disabled</span>
    {% else %}
    <form method="post" action="/logout" class="logout-form">
      <span class="who">{{ user.username }}</span>
      <button type="submit">Log out</button>
    </form>
    {% endif %}
  </header>
  {% endif %}
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <script src="/static/local-time.js?v={{ STATIC_VERSION }}"></script>
</body>
</html>
