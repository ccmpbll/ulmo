{% extends "base.html" %}
{% block title %}{{ run.playbook }} - homelab-deck{% endblock %}
{% block content %}
<div class="page-header">
  <h1>{{ run.playbook }} <span class="badge {{ run.status }}" id="status-badge">{{ run.status }}</span></h1>
  <a class="btn secondary" href="/runs">Back to history</a>
</div>
{% if run.tags %}<p class="muted">tags: <code>{{ run.tags }}</code></p>{% endif %}
<pre class="log" id="log"></pre>

<script src="https://unpkg.com/ansi_up@5.2.1/ansi_up.js"></script>
<script>
  const logEl = document.getElementById("log");
  const ansiUp = new AnsiUp();
  const initialLog = {{ log | tojson }};
  logEl.innerHTML = ansiUp.ansi_to_html(initialLog);
  logEl.scrollTop = logEl.scrollHeight;

  {% if run.status == "running" %}
  const badgeEl = document.getElementById("status-badge");
  const source = new EventSource("/runs/{{ run.id }}/stream");
  source.onmessage = (event) => {
    logEl.insertAdjacentHTML("beforeend", ansiUp.ansi_to_html(JSON.parse(event.data)));
    logEl.scrollTop = logEl.scrollHeight;
  };
  source.addEventListener("done", (event) => {
    badgeEl.textContent = event.data;
    badgeEl.className = "badge " + event.data;
    source.close();
  });
  {% endif %}
</script>
{% endblock %}
