{% extends "base.html" %}
{% block title %}Initial setup - homelab-deck{% endblock %}
{% block content %}
<div class="auth-card">
  <h1>Welcome to homelab-deck</h1>
  <p class="muted">Create the first admin account to get started.</p>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" action="/setup">
    <label>Username<input type="text" name="username" autofocus required /></label>
    <label>Password<input type="password" name="password" required /></label>
    <label>Confirm password<input type="password" name="password_confirm" required /></label>
    <button type="submit">Create account</button>
  </form>
</div>
{% endblock %}
