services:
  homelab-deck:
    build: .
    image: homelab-deck:latest
    container_name: homelab-deck
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      HOMELAB_DECK_SECRET_KEY: "${HOMELAB_DECK_SECRET_KEY:?set this in .env}"
      # Uncomment to skip the login screen entirely (e.g. behind your own reverse
      # proxy or VPN-only network). Off by default.
      # HOMELAB_DECK_DISABLE_AUTH: "true"
    volumes:
      - ./data:/data
      # The SSH private key used by ansible-playbook to reach your managed hosts is
      # uploaded and stored from the Settings page (persisted under ./data/ssh_home),
      # no separate key mount needed. If your git remote is private and needs its own
      # SSH key (distinct from the ansible target-host key), mount it here instead:
      # - ~/.ssh/git_deploy_key:/root/.ssh/git_deploy_key:ro
